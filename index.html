<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Browser</title>
  </head>
  <body class="bg-slate-500 text-red-200 min-h-screen flex items-center justify-center">
    <main class="bg-slate-900 p-8 rounded-xl shadow-xl w-200 text-center">

    <h1 class="text-3xl font-bold mb-6">
      Pokémon Browser image 
    </h1>

    <figure class="flex justify-center mb-4">
      <img
        id="pokemon-image"
        src=""
        alt="Pokemon image"
        class="w-80 h-50"
      />
    </figure>
 <h2
      id="pokemon-name"
      class="text-2xl font-semibold capitalize mb-4"
    >
      Loading...
    </h2>

    <ul
      id="pokemon-types"
      class="flex justify-center gap-4 mb-8"
    >
    </ul>

    <div class="flex justify-between">

      <button
        id="prev-btn"
        class="bg-blue-800 px-6 py-4 rounded hover:bg-blue-800"
      >
        Prev
      </button>

      <button
        id="next-btn"
        class="bg-blue-800 px-6 py-4 rounded hover:bg-blue-800"
      >
        Next
      </button>

    </div>
   
  </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
